name: Feedback (data error or suggestion)
description: Report an incorrect data point or suggest an improvement
title: "[Feedback] "
body:
  - type: markdown
    attributes:
      value: |
        This doesn't trigger anything automatically — just flags it for me to
        look at. For data errors, a source link showing the correct value is
        the single most useful thing you can include.
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Data error
        - Suggestion
        - Other
    validations:
      required: true
  - type: input
    id: city
    attributes:
      label: City (if applicable)
      description: e.g. Boise, ID
    validations:
      required: false
  - type: input
    id: field
    attributes:
      label: Field (if applicable)
      description: e.g. Wildfire Risk, BD Score
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What's wrong, or what you'd suggest. For data errors, a source link helps a lot.
    validations:
      required: true
